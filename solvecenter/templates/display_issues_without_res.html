
{% load static %}
{% load django_bootstrap5 %}

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        {% bootstrap_css %}
        {% bootstrap_javascript %}
    </head>
    <body>
        <div class="d-flex justify-content-center">
            <button class="btn btn-primary" type="button" data-bs-toggle="offcanvas" data-bs-target="#otherOperations" aria-controls="offcanvasScrolling">Other Operations</button>
        </div>
        {% include 'otherOperations.html' %}
        <br>
        {% if all_issues %}
            {% for issues in all_issues %}
            <div class="d-flex mt-3">
                <div class="list-group">
                    <a href="{% url 'enter_new_resolution' issues.pk %}" style="background-color: lightgrey" onmouseover="this.style.background='lightblue';" onmouseout="this.style.background='lightgray';"  class="list-group-item list-group-item-action">
                        <small>{{issues.reported_issue}}</small>
                    </a>
                </div>
            </div>
            {% endfor %}
        {% else %}
            <h1 style="text-align: center;">No issues without resolution</h1>
        {% endif %}
    </body>
</html>
